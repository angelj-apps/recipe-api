<!DOCTYPE html>
<html>
<head>
    <title>Recipe API Form</title>
</head>
<body>
    <h1>Add a Recipe</h1>
    <form id="recipeForm">
        <label for="name">Name:</label><br>
        <input type="text" id="name" required><br><br>

        <label for="ingredients">Ingredients:</label><br>
        <input type="text" id="ingredients" required><br><br>

        <label for="cook_time">Cook Time (minutes):</label><br>
        <input type="number" id="cook_time" required><br><br>

        <button type="submit">Add Recipe</button>
    </form>

    <p id="result"></p>

    <script>
        const form = document.getElementById('recipeForm');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const recipe = {
                name: document.getElementById('name').value,
                ingredients: document.getElementById('ingredients').value,
                cook_time: parseInt(document.getElementById('cook_time').value)
            };

            try {
                const response = await fetch('http://127.0.0.1:5000/recipes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(recipe)
                });

                const data = await response.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
                form.reset();
            } catch (err) {
                document.getElementById('result').innerText = 'Error: ' + err;
            }
        });
    </script>
</body>
</html>
